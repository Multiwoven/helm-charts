# Box HorizontalPodAutoscaler
# Autoscales the box deployment based on CPU and memory utilization.
# Only rendered when both hpa.enabled and box.enabled are true.
# Scale-up uses both percent-based and pod-based policies (whichever is larger).
# Scale-down has a 300s stabilization window to avoid thrashing.
{{ if and .Values.hpa.enabled .Values.box.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "chart.fullname" . }}-box-hpa
  namespace: {{ .Values.kubernetesNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: box-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "chart.fullname" . }}-box
  minReplicas: {{ .Values.hpa.box.minReplicas }}
  maxReplicas: {{ .Values.hpa.box.maxReplicas }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.hpa.box.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
      - type: {{ .Values.hpa.box.behavior.scaleDown.policies.percentPolicy.type }}
        value: {{ .Values.hpa.box.behavior.scaleDown.policies.percentPolicy.value }}
        periodSeconds: {{ .Values.hpa.box.behavior.scaleDown.policies.percentPolicy.periodSeconds }}
      - type: {{ .Values.hpa.box.behavior.scaleDown.policies.podPolicy.type }}
        value: {{ .Values.hpa.box.behavior.scaleDown.policies.podPolicy.value }}
        periodSeconds: {{ .Values.hpa.box.behavior.scaleDown.policies.podPolicy.periodSeconds }}
      selectPolicy: {{ .Values.hpa.box.behavior.scaleDown.policies.selectPolicy }}
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.hpa.box.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
      - type: {{ .Values.hpa.box.behavior.scaleUp.policies.percentPolicy.type }}
        value: {{ .Values.hpa.box.behavior.scaleUp.policies.percentPolicy.value }}
        periodSeconds: {{ .Values.hpa.box.behavior.scaleUp.policies.percentPolicy.periodSeconds }}
      - type: {{ .Values.hpa.box.behavior.scaleUp.policies.podPolicy.type }}
        value: {{ .Values.hpa.box.behavior.scaleUp.policies.podPolicy.value }}
        periodSeconds: {{ .Values.hpa.box.behavior.scaleUp.policies.podPolicy.periodSeconds }}
      selectPolicy: {{ .Values.hpa.box.behavior.scaleUp.policies.selectPolicy }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.hpa.box.cpuAverageUtilizationPercentageThreshold }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.hpa.box.memoryAverageUtilizationPercentageThreshold }}
{{ end }}