    image:
      repository: temporalio/ui
      tag: 2.22.3
    initContainer:
      image:
        repository: temporalio/ui
        tag: 2.22.3
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  type: ClusterIP
lightning:
  enabled: true
