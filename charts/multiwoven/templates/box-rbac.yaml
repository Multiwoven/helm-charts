# Box RBAC
# Contains the ClusterRole and two RoleBindings for the box orchestrator.
#
# ClusterRole: defines permissions box needs to manage sandbox resources:
#   - pods, services, secrets, PVCs in the sandbox namespace
#   - ingresses and network policies for sandbox isolation
#   - volumesnapshots in the releases namespace for sandbox snapshotting
#
# RoleBinding (sandbox namespace): grants the ClusterRole to the box service account
#   in boxConfig.boxK8sNamespace (default: box-sandboxes), where sandbox pods run.
#
# RoleBinding (releases namespace): grants the ClusterRole to the box service account
#   in boxConfig.boxReleasesNamespace (default: box-releases), where snapshots are stored.
#
# For restricted environments (e.g. GovCloud), set box.rbac.create: false and
# have the cluster admin apply these resources out-of-band before deploying the chart.
{{- if and .Values.box.enabled .Values.box.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-box-controller
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chart.fullname" . }}-box-controller
  namespace: {{ .Values.boxConfig.boxK8sNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chart.fullname" . }}-box-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "chart.fullname" . }}-box-controller
    namespace: {{ .Values.kubernetesNamespace }}

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chart.fullname" . }}-box-controller-releases
  namespace: {{ .Values.boxConfig.boxReleasesNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chart.fullname" . }}-box-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "chart.fullname" . }}-box-controller
    namespace: {{ .Values.kubernetesNamespace }}
{{- end }}

