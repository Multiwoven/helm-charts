# Box ServiceAccount
# Dedicated service account for the box orchestrator.
# This is intentionally separate from the shared multiwoven service account
# because box carries elevated RBAC permissions (pod/PVC/secret management)
# in the sandbox and releases namespaces.
# Enabled via box.enabled. Disabled by default.
{{- if .Values.box.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chart.fullname" . }}-box-controller
  namespace: {{ .Values.kubernetesNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
{{- end }}
