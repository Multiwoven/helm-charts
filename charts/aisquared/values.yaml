aisquaredPostgresql:
  enabled: true
  annotations: {}
  aisquaredPostgresql:
    image:
      repository: postgres
      tag: "13"
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  replicas: 1
  type: ClusterIP
aisquaredServer:
  annotations: {}
  podSecurityContext:
    fsGroup: 1000
  aisquaredServer:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
    image:
      repository: aisquared/aisquared-server
      tag: latest
    resources:
      limits:
        cpu: "2"
        memory: "3Gi"
      requests:
        cpu: "1"
        memory: "1Gi"
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
  replicas: 1
  type: ClusterIP
aisquaredUI:
  annotations: {}
  podSecurityContext:
    fsGroup: 1000
  aisquaredUI:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
    image:
      repository: aisquared/aisquared-ui
      tag: latest
    resources:
      limits:
        cpu: "200m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "256Mi"
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  replicas: 1
  type: ClusterIP
aisquaredSolidWorker:
  annotations: {}
  healthPort: 9999
  podSecurityContext:
    fsGroup: 1000
  aisquaredSolidWorker:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
    args:
      - sh
      - -c
      - |
        ./app/solid_queue/cli/worker
    image:
      repository: aisquared/aisquared-server
      tag: latest
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "500m"
        memory: 1Gi
  ports:
    - name: "9999"
      port: 9999
      targetPort: 9999
  replicas: 1
  type: ClusterIP
aisquaredWorker:
  annotations: {}
  healthPort: 4567
  podSecurityContext:
    fsGroup: 1000
  aisquaredWorker:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
    args:
      - sh
      - -c
      - |
        ./app/temporal/cli/register_namespace && ./app/temporal/cli/worker
    image:
      repository: aisquared/aisquared-server
      tag: latest
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: "500m"
        memory: 1Gi
  ports:
    - name: "4567"
      port: 4567
      targetPort: 4567
  replicas: 1
  type: ClusterIP
pvc:
  pvc:
