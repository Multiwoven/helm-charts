multiwovenPostgresql:
  enabled: true
  annotations: {}
  multiwovenPostgresql:
    image:
      repository: postgres
      tag: "13"
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  replicas: 1
  type: ClusterIP
multiwovenServer:
  annotations: {}
  podSecurityContext:
    fsGroup: 1000
  multiwovenServer:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
    image:
      repository: multiwoven/multiwoven-server
      tag: latest
    resources:
      limits:
        cpu: "2"
        memory: "3Gi"
      requests:
        cpu: "1"
        memory: "1Gi"
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
  replicas: 1
  type: ClusterIP
multiwovenUI:
  annotations: {}
  podSecurityContext:
    fsGroup: 1000
  multiwovenUI:
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
